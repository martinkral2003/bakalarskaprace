<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sewer Inspection Robot</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>

    <div id="app">

        <!-- LEFT: Video Area -->
        <div id="video-section">
            <div id="video-container">
                <img id="camera-stream" src="/stream.mjpg">
                <canvas id="horizon-overlay"></canvas>
            </div>
       
            <!-- MOBILE: Movement Controls -->
            <div id="mobile-movement" class="hidden-desktop">
                <h3>Movement</h3>
                <div class="d-pad">
                    <button id="btn-forward" class="d-pad-btn forward">▲</button>
                    <div class="d-pad-row">
                        <button id="btn-left" class="d-pad-btn left">◄</button>
                        <button id="btn-stop" class="d-pad-btn stop">STOP</button>
                        <button id="btn-right" class="d-pad-btn right">►</button>
                    </div>
                    <button id="btn-backward" class="d-pad-btn backward">▼</button>
                </div>
            </div>
        </div>

        <!-- RIGHT: Control Panel -->
        <div id="control-panel">

            <h3>Browser to Flask Latency: <span id="stat-latency">--</span>ms</h3>
            <h3>Video FPS: <span id="stat-fps">--</span></h3>
  

            <h2>Movement</h2>
            <div id="desktop-movement" class="hidden-mobile">
                <p style="font-size: 12px; color: #999; margin-bottom: 15px;">Arrow buttons are available on mobile/tablet. On desktop, use keyboard arrows.</p>
            </div>

            <h2>Camera</h2>
            <label>Down-Up
                <input type="range" id="servo-y" min="-65" max="110" value="30">
            </label>

            <label>Left-Right
                <input type="range" id="servo-x" min="-120" max="120" value="0">
            </label>

            <button id="home-camera">Home</button>

            <h3>Resolution</h3>
            <select id="resolution">
                <option value="640x480">640x480</option>
                <option value="1280x720" selected>1280x720</option>
                <option value="1296x972">1296x972</option>
            </select>

            <h2>LED Light</h2>
            <label>Brightness
                <input type="range" id="led-brightness" min="0" max="100" value="50">
            </label>

            <button id="led-toggle">Turn LED On</button>
            <button id="toggle-horizon">Hide Artificial Horizon</button>
        </div>

    </div>

    <script type="module" src="/static/js/main.js"></script>
    </body>

    
</html>
